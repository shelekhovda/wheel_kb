<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🎰 Колесо фортуны PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at center, #222, #000);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  margin-top: 20px;
}

#wrapper {
  position: relative;
  width: 420px;
  height: 420px;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  border-radius: 50%;
}

/* стрелка справа */
#arrowCanvas {
  width: 500px;
  height: 500px;
  left: -40px;
  top: -40px;
  z-index: 10;
  pointer-events: none;
}

.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

textarea {
  width: 400px;
  height: 100px;
  border-radius: 8px;
  padding: 10px;
  font-size: 14px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  background: #ff9800;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  box-shadow: 0 0 10px #ff9800;
}

#result {
  font-size: 26px;
  font-weight: bold;
  text-align: center;
  text-shadow: 0 0 10px yellow;
  min-height: 30px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎰 Колесо фортуны PRO</h1>

<div class="controls">
<textarea id="sectorsInput">
Что с интернетом?
АКБ уезжают?
ФН заменили?
Битрикс жив?
Графана тест?
</textarea>

<button id="updateBtn">Обновить</button>
</div>

<div id="wrapper">
  <canvas id="wheel" width="420" height="420"></canvas>
  <canvas id="arrowCanvas" width="500" height="500"></canvas>
</div>

<button id="spinBtn">Крутить</button>

<div id="result"></div>

</div>

<!-- звуки -->
<audio id="tick" src="https://assets.mixkit.co/sfx/preview/mixkit-click-1112.mp3"></audio>
<audio id="win" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

<script>
const wheel = document.getElementById("wheel");
const ctx = wheel.getContext("2d");

const arrowCanvas = document.getElementById("arrowCanvas");
const arrowCtx = arrowCanvas.getContext("2d");

const tick = document.getElementById("tick");
const win = document.getElementById("win");

let options = [];
let angle = 0;
let spinning = false;
let lastTickIndex = 0;
let highlightIndex = -1;

const radius = 210;

/* ===== КОЛЕСО ===== */
function drawWheel(){
  ctx.clearRect(0,0,420,420);

  const num = options.length;
  if(num === 0) return;

  const arc = 2*Math.PI/num;

  for(let i=0;i<num;i++){
    ctx.fillStyle = i===highlightIndex ? "#ffff00" : (i%2?"#fff":"#f00");

    ctx.beginPath();
    ctx.moveTo(radius,radius);
    ctx.arc(radius,radius,radius,i*arc,(i+1)*arc);
    ctx.fill();

    ctx.save();
    ctx.translate(radius,radius);
    ctx.rotate(i*arc + arc/2);

    ctx.fillStyle="#000";
    ctx.font="bold 16px Arial";
    ctx.textAlign="center";
    ctx.textBaseline="middle";

    wrapText(options[i]);

    ctx.restore();
  }
}

function wrapText(text){
  const words = text.split(" ");
  let line="", lines=[];
  for(let w of words){
    let test = line + w + " ";
    if(ctx.measureText(test).width > 120){
      lines.push(line);
      line = w+" ";
    } else line = test;
  }
  lines.push(line);

  let startY = -((lines.length-1)/2)*18;
  lines.forEach((l,i)=>{
    ctx.fillText(l, radius*0.6, startY + i*18);
  });
}

/* ===== ОБЪЕМНАЯ СТРЕЛКА СПРАВА ===== */
function drawArrow(){
  arrowCtx.clearRect(0,0,500,500);

  arrowCtx.save();

  // центр canvas
  arrowCtx.translate(250,250);

  // 👉 смещаем стрелку строго вправо (к краю колеса)
  arrowCtx.translate(210, 0);

  // 👉 теперь поворачиваем "в центр" (влево)
  arrowCtx.rotate(Math.PI); 

  // градиент (объем)
  const grad = arrowCtx.createLinearGradient(-40,-20,40,20);
  grad.addColorStop(0,"#fff3e0");
  grad.addColorStop(0.5,"#ff9800");
  grad.addColorStop(1,"#e65100");

  arrowCtx.fillStyle = grad;
  arrowCtx.shadowColor = "rgba(0,0,0,0.7)";
  arrowCtx.shadowBlur = 15;

  // форма стрелки (смотрит в центр)
  arrowCtx.beginPath();
  arrowCtx.moveTo(40,0);
  arrowCtx.lineTo(-20,-25);
  arrowCtx.lineTo(-10,-10);
  arrowCtx.lineTo(-80,-10);
  arrowCtx.lineTo(-80,10);
  arrowCtx.lineTo(-10,10);
  arrowCtx.lineTo(-20,25);
  arrowCtx.closePath();
  arrowCtx.fill();

  arrowCtx.strokeStyle = "#bf360c";
  arrowCtx.lineWidth = 2;
  arrowCtx.stroke();

  arrowCtx.restore();
}

/* ===== ВРАЩЕНИЕ ===== */
function spin(){
  if(spinning || options.length===0) return;

  spinning=true;

  const slice = 360/options.length;
  const index = Math.floor(Math.random()*options.length);

  const final = 360*5 + index*slice + slice/2;
  const start = angle;
  let startTime=null;

  function frame(t){
    if(!startTime) startTime=t;

    let p = (t-startTime)/4000;
    if(p>1) p=1;

    let ease = 1-Math.pow(1-p,3);
    angle = start + (final-start)*ease;

    wheel.style.transform = `rotate(${angle}deg)`;

    let cur = Math.floor((angle%360)/slice);
    if(cur!==lastTickIndex){
      tick.currentTime=0;
      tick.play();
      lastTickIndex=cur;
    }

    if(p<1) requestAnimationFrame(frame);
    else finish();
  }

  requestAnimationFrame(frame);
}

/* ===== ФИНИШ ===== */
function finish(){
  const slice = 360/options.length;

  let norm = angle%360;
  let index = Math.floor((360-norm)/slice)%options.length;

  highlightIndex = index;
  drawWheel();

  document.getElementById("result").innerText = options[index];
  win.play();

  spinning=false;
}

/* ===== ОБНОВЛЕНИЕ ===== */
function update(){
  options = document.getElementById("sectorsInput").value
    .split("\n")
    .map(x=>x.trim())
    .filter(x=>x);

  drawWheel();
}

/* INIT */
drawArrow();
update();

document.getElementById("spinBtn").onclick = spin;
document.getElementById("updateBtn").onclick = update;
</script>

</body>
</html>
