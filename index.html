<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🎰 Колесо фортуны PRO</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at center, #222, #000);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  margin-top: 20px;
}

#wrapper {
  position: relative;
  width: 420px;
  height: 420px;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  border-radius: 50%;
}

/* стрелка справа */
#arrowCanvas {
  width: 500px;
  height: 500px;
  left: -40px;
  top: -40px;
  z-index: 10;
  pointer-events: none;
}

.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

textarea {
  width: 400px;
  height: 100px;
  border-radius: 8px;
  padding: 10px;
  font-size: 14px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  background: #ff9800;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  box-shadow: 0 0 10px #ff9800;
}

#result {
  font-size: 26px;
  font-weight: bold;
  text-align: center;
  text-shadow: 0 0 10px yellow;
  min-height: 30px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎰 Колесо фортуны PRO</h1>

<div class="controls">
<textarea id="sectorsInput">
Что с интернетом?
АКБ уезжают?
ФН заменили?
Битрикс тестируете?
Графану тестируете?
Таблички все заполнили?
</textarea>

<button id="updateBtn">Обновить</button>
</div>

<div id="wrapper">
  <canvas id="wheel" width="420" height="420"></canvas>
  <canvas id="arrowCanvas" width="500" height="500"></canvas>
</div>

<button id="spinBtn">Крутить</button>

<div id="result"></div>

</div>

<!-- звуки -->
<audio id="tick" src="https://assets.mixkit.co/sfx/preview/mixkit-click-1112.mp3"></audio>
<audio id="win" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

<script>
const wheel = document.getElementById("wheel");
const ctx = wheel.getContext("2d");

const arrowCanvas = document.getElementById("arrowCanvas");
const arrowCtx = arrowCanvas.getContext("2d");

const tick = document.getElementById("tick");
const win = document.getElementById("win");

let options = [];
let angle = 0;          // текущий угол поворота колеса в градусах
let spinning = false;
let lastTickIndex = 0;
let highlightIndex = -1;
let animationFrameId = null; // для возможности прерывания анимации

const radius = 210;

/* ===== КОЛЕСО ===== */
function drawWheel() {
  ctx.clearRect(0, 0, 420, 420);
  const num = options.length;
  if (num === 0) return;

  const arc = 2 * Math.PI / num;

  for (let i = 0; i < num; i++) {
    // выбор цвета: подсветка выигрышного сектора, иначе чередование
    ctx.fillStyle = (i === highlightIndex) ? "#ffff00" : (i % 2 ? "#fff" : "#f00");

    ctx.beginPath();
    ctx.moveTo(radius, radius);
    ctx.arc(radius, radius, radius, i * arc, (i + 1) * arc);
    ctx.fill();

    ctx.save();
    ctx.translate(radius, radius);
    ctx.rotate(i * arc + arc / 2);

    ctx.fillStyle = "#000";
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    wrapText(options[i]);

    ctx.restore();
  }
}

// перенос текста, если не помещается
function wrapText(text) {
  const words = text.split(" ");
  let line = "", lines = [];
  for (let w of words) {
    let test = line + w + " ";
    if (ctx.measureText(test).width > 120) {
      lines.push(line);
      line = w + " ";
    } else {
      line = test;
    }
  }
  lines.push(line);

  const lineHeight = 18;
  let startY = -((lines.length - 1) / 2) * lineHeight;
  lines.forEach((l, i) => {
    ctx.fillText(l, radius * 0.6, startY + i * lineHeight);
  });
}

/* ===== ОБЪЕМНАЯ СТРЕЛКА СПРАВА ===== */
function drawArrow() {
  arrowCtx.clearRect(0, 0, 500, 500);
  arrowCtx.save();

  // центр canvas
  arrowCtx.translate(250, 250);
  // смещаем стрелку строго вправо (к краю колеса)
  arrowCtx.translate(210, 0);
  // поворачиваем, чтобы смотреть в центр
  arrowCtx.rotate(Math.PI);

  const grad = arrowCtx.createLinearGradient(-40, -20, 40, 20);
  grad.addColorStop(0, "#fff3e0");
  grad.addColorStop(0.5, "#ff9800");
  grad.addColorStop(1, "#e65100");

  arrowCtx.fillStyle = grad;
  arrowCtx.shadowColor = "rgba(0,0,0,0.7)";
  arrowCtx.shadowBlur = 15;

  arrowCtx.beginPath();
  arrowCtx.moveTo(40, 0);
  arrowCtx.lineTo(-20, -25);
  arrowCtx.lineTo(-10, -10);
  arrowCtx.lineTo(-80, -10);
  arrowCtx.lineTo(-80, 10);
  arrowCtx.lineTo(-10, 10);
  arrowCtx.lineTo(-20, 25);
  arrowCtx.closePath();
  arrowCtx.fill();

  arrowCtx.strokeStyle = "#bf360c";
  arrowCtx.lineWidth = 2;
  arrowCtx.stroke();

  arrowCtx.restore();
}

/* ===== ВРАЩЕНИЕ ===== */
function spin() {
  if (spinning || options.length === 0) return;

  spinning = true;
  // отменяем предыдущую анимацию, если была
  if (animationFrameId) cancelAnimationFrame(animationFrameId);

  const slice = 360 / options.length;
  // случайный целевой сектор (индекс)
  const targetIndex = Math.floor(Math.random() * options.length);

  // минимальное вращение: 0.5 оборота + случайное от 2 до 6 оборотов
  const minSpins = 0.5;
  const extraSpins = Math.random() * 4 + 2; // от 2 до 6
  // итоговый угол = (целое число оборотов) + угол центра целевого сектора
  let finalBase = 360 * (minSpins + extraSpins) + targetIndex * slice + slice / 2;

  // шанс 35% на "почти попал" (перелёт с откатом)
  let overshoot = 0;
  if (Math.random() < 0.35) {
    overshoot = slice * (0.3 + Math.random() * 0.4);
    finalBase += overshoot;
  }

  const finalAngle = finalBase;
  const startAngle = angle;
  let startTime = null;

  function animateFrame(timestamp) {
    if (!startTime) startTime = timestamp;

    let progress = (timestamp - startTime) / 4000;
    if (progress > 1) progress = 1;

    // ease: быстрый разгон в начале, плавное торможение в конце
    let ease;
    if (progress < 0.2) {
      ease = 2.5 * progress * progress;       // разгон
    } else {
      const t = (progress - 0.2) / 0.8;
      ease = 0.1 + (1 - Math.pow(1 - t, 4)) * 0.9; // торможение
    }

    angle = startAngle + (finalAngle - startAngle) * ease;
    wheel.style.transform = `rotate(${angle}deg)`;

    // звук при переключении сектора
    const cur = Math.floor(((angle % 360) + 360) % 360 / slice);
    if (cur !== lastTickIndex) {
      tick.currentTime = 0;
      tick.play().catch(e => console.log("Audio play error", e));
      lastTickIndex = cur;
    }

    if (progress < 1) {
      animationFrameId = requestAnimationFrame(animateFrame);
    } else {
      // анимация завершена
      animationFrameId = null;
      if (overshoot > 0) {
        animateBack(overshoot);
      } else {
        finish();
      }
    }
  }

  animationFrameId = requestAnimationFrame(animateFrame);
}

/* ===== ОТКАТ (эффект "почти попал") ===== */
function animateBack(back) {
  const start = angle;
  const target = angle - back;
  const duration = 600;
  let startTime = null;

  function frame(timestamp) {
    if (!startTime) startTime = timestamp;
    let progress = (timestamp - startTime) / duration;
    if (progress > 1) progress = 1;

    const ease = 1 - Math.pow(1 - progress, 2); // легкая пружина
    angle = start + (target - start) * ease;
    wheel.style.transform = `rotate(${angle}deg)`;

    if (progress < 1) {
      requestAnimationFrame(frame);
    } else {
      finish();
    }
  }

  requestAnimationFrame(frame);
}

/* ===== ФИНИШ: определение выигрышного сектора ===== */
function finish() {
  const slice = 360 / options.length;
  // нормализуем угол поворота колеса (0..360)
  let norm = angle % 360;
  if (norm < 0) norm += 360;

  // Стрелка находится справа и смотрит в центр.
  // При угле поворота колеса angle точка, которая была на 0° (вправо),
  // смещается на angle° по часовой стрелке.
  // Нам нужно определить, какой сектор сейчас находится напротив стрелки (на угле 0°).
  // Для этого берём угол, обратный повороту: (360 - norm) % 360.
  // Делим на размер сектора и получаем индекс.
  let index = Math.floor(((360 - norm) % 360) / slice) % options.length;

  highlightIndex = index;
  drawWheel();

  const resultDiv = document.getElementById("result");
  resultDiv.innerText = options[index];
  win.play().catch(e => console.log("Audio play error", e));

  spinning = false;
}

/* ===== ОБНОВЛЕНИЕ СЕКТОРОВ ===== */
function update() {
  if (spinning) {
    alert("Дождитесь окончания вращения!");
    return;
  }

  // сбрасываем состояние
  if (animationFrameId) {
    cancelAnimationFrame(animationFrameId);
    animationFrameId = null;
  }

  options = document.getElementById("sectorsInput").value
    .split("\n")
    .map(x => x.trim())
    .filter(x => x);

  // сброс угла и подсветки
  angle = 0;
  highlightIndex = -1;
  lastTickIndex = 0;
  wheel.style.transform = "rotate(0deg)";
  document.getElementById("result").innerText = "";

  drawWheel();
}

/* ===== ИНИЦИАЛИЗАЦИЯ ===== */
drawArrow();
update();

document.getElementById("spinBtn").onclick = spin;
document.getElementById("updateBtn").onclick = update;
</script>

</body>
</html>
