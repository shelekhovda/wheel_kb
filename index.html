<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Колесо фортуны</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: radial-gradient(circle, #222, #000);
  color: white;
}

#wrapper {
  position: relative;
  width: 420px;
  margin: auto;
}

canvas {
  border-radius: 50%;
}

/* стрелка */
#arrow {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-bottom: 30px solid red;
}

button {
  margin-top: 20px;
  padding: 10px 25px;
  font-size: 18px;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  font-size: 22px;
}
</style>
</head>

<body>

<h1>🎯 Колесо фортуны</h1>

<div id="wrapper">
  <div id="arrow"></div>
  <canvas id="wheel" width="400" height="400"></canvas>
</div>

<button onclick="spin()">Крутить</button>
<h2 id="result"></h2>

<audio id="tick" src="https://assets.mixkit.co/sfx/preview/mixkit-slot-machine-wheel-1934.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* 🔑 ВСТАВЬ СВОЙ FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyA0eZ-1AEhH1ovbz-11thQe79Ej_f8nou8",
  authDomain: "wheel-kb.firebaseapp.com",
  databaseURL: "https://wheel-kb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wheel-kb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const options = [
  "Что с интернетом?",
  "Что у нас с АКБ, уезжают?",
  "ФН все заменили?",
  "Что с Битриксом, работаете?",
  "Графану тестируете?",
  "Старые регистраторы поменяли?"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const tick = document.getElementById("tick");

const radius = 200;
let angle = 0;
let spinning = false;

function drawWheel() {
  const slice = 2 * Math.PI / options.length;

  for (let i = 0; i < options.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = i % 2 ? "#ff5722" : "#ffc107";
    ctx.moveTo(radius, radius);
    ctx.arc(radius, radius, radius, i * slice, (i + 1) * slice);
    ctx.fill();

    ctx.save();
    ctx.translate(radius, radius);
    ctx.rotate(i * slice + slice / 2);
    ctx.fillStyle = "#000";
    ctx.fillText(options[i], 20, 5);
    ctx.restore();
  }
}

drawWheel();

/* 🎰 Анимация с easing */
function animateSpin(targetAngle) {
  let start = angle;
  let startTime = null;

  function animate(time) {
    if (!startTime) startTime = time;
    let progress = (time - startTime) / 4000;

    if (progress > 1) progress = 1;

    // ease-out (как казино)
    let ease = 1 - Math.pow(1 - progress, 3);
    angle = start + (targetAngle - start) * ease;

    canvas.style.transform = `rotate(${angle}deg)`;

    // звук "трещотки"
    if (progress < 1 && Math.random() < 0.2) {
      tick.currentTime = 0;
      tick.play();
    }

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      finishSpin();
    }
  }

  requestAnimationFrame(animate);
}

/* 🔄 Запуск */
window.spin = function () {
  if (spinning) return;
  spinning = true;

  const spinAngle = Math.random() * 360 + 1440;

  // отправляем в Firebase
  set(ref(db, "spin"), {
    angle: angle + spinAngle
  });
};

/* 👥 Мультиплеер */
onValue(ref(db, "spin"), (snapshot) => {
  const data = snapshot.val();
  if (!data) return;

  animateSpin(data.angle);
});

/* 🎯 Результат */
function finishSpin() {
  const slice = 360 / options.length;
  const index = Math.floor((360 - (angle % 360)) / slice) % options.length;

  document.getElementById("result").innerText = options[index];
  spinning = false;
}
</script>

</body>
</html>
