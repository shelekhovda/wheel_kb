<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Колесо фортуны</title>

<style>
body {
  text-align: center;
  font-family: Arial;
  background: #111;
  color: white;
}

#wrapper {
  position: relative;
  width: 420px;
  margin: auto;
}

/* стрелка сверху */
#arrow {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-bottom: 40px solid red;
  z-index: 10;
}

canvas {
  border-radius: 50%;
  transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1);
}

button {
  margin-top: 20px;
  padding: 12px 30px;
  font-size: 18px;
  cursor: pointer;
}

#result {
  margin-top: 20px;
  font-size: 24px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🎯 Планёрка К&Б</h1>

<div id="wrapper">
  <div id="arrow"></div>
  <canvas id="wheel" width="400" height="400"></canvas>
</div>

<button onclick="spin()">Крутить</button>
<h2 id="result"></h2>

<audio id="tick" src="https://assets.mixkit.co/sfx/preview/mixkit-slot-machine-wheel-1934.mp3"></audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

/* 🔑 Вставь сюда свой Firebase config */
const firebaseConfig = {
  apiKey: "AIzaSyA0eZ-1AEhH1ovbz-11thQe79Ej_f8nou8",
  authDomain: "wheel-kb.firebaseapp.com",
  databaseURL: "https://wheel-kb-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wheel-kb"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const options = [
  "Что с интернетом?",
  "Что у нас с АКБ, уезжают?",
  "ФН все заменили?",
  "Что с Битриксом, работаете?",
  "Графану тестируете?",
  "У меня всё, вопросы?"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const tick = document.getElementById("tick");

const radius = 200;
let angle = 0;
let spinning = false;
const slice = 360 / options.length;

/* 🎨 Рисуем колесо с красным/оранжевым чередованием, увеличенным шрифтом и тенью */
function drawWheel() {
  const arc = 2 * Math.PI / options.length;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < options.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = i % 2 === 0 ? "#ff0000" : "#ff9800"; // красный и оранжевый
    ctx.moveTo(radius, radius);
    ctx.arc(radius, radius, radius, i * arc, (i + 1) * arc);
    ctx.fill();

    ctx.save();
    ctx.translate(radius, radius);
    ctx.rotate(i * arc + arc / 2);

    ctx.fillStyle = "#000";
    ctx.font = "bold 18px Arial";
    ctx.shadowColor = "#000";
    ctx.shadowBlur = 4;
    ctx.fillText(options[i], 30, 10);
    ctx.restore();
  }
}

drawWheel();

/* 🎰 Анимация вращения */
function animateSpin(target) {
  let start = angle;
  let startTime = null;

  function frame(time) {
    if (!startTime) startTime = time;
    let progress = (time - startTime) / 4000;
    if (progress > 1) progress = 1;

    let ease = 1 - Math.pow(1 - progress, 3);
    angle = start + (target - start) * ease;

    canvas.style.transform = `rotate(${angle}deg)`;

    if (progress < 1 && Math.random() < 0.15) {
      tick.currentTime = 0;
      tick.play();
    }

    if (progress < 1) requestAnimationFrame(frame);
    else finish();
  }

  requestAnimationFrame(frame);
}

/* 🎯 Крутить */
window.spin = function () {
  if (spinning) return;
  spinning = true;

  const spins = Math.floor(Math.random() * options.length);
  const finalAngle =
    360 * 5 + // обороты
    (spins * slice + slice / 2); // точная остановка под стрелкой сверху

  set(ref(db, "spin"), {
    angle: finalAngle
  });
};

/* 👥 Синхронизация */
onValue(ref(db, "spin"), (snap) => {
  const data = snap.val();
  if (!data) return;
  animateSpin(data.angle);
});

/* 🧠 Финальный результат */
function finish() {
  const normalized = angle % 360;
  let index = Math.floor(normalized / slice);
  index = (options.length - index) % options.length; // стрелка сверху
  document.getElementById("result").innerText = options[index];
  spinning = false;
  drawWheel(); // перерисовываем колесо на случай смещения
}
</script>

</body>
</html>
