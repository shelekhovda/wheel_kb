<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>🎰 Колесо фортуны PRO 14.56</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle at center, #222, #000);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  margin-top: 20px;
}

#wrapper {
  position: relative;
  width: 420px;
  height: 420px;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  border-radius: 50%;
}

/* стрелка справа */
#arrowCanvas {
  width: 500px;
  height: 500px;
  left: -40px;
  top: -40px;
  z-index: 10;
  pointer-events: none;
}

.controls {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

textarea {
  width: 400px;
  height: 100px;
  border-radius: 8px;
  padding: 10px;
  font-size: 14px;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  background: #ff9800;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  box-shadow: 0 0 10px #ff9800;
}

#result {
  font-size: 26px;
  font-weight: bold;
  text-align: center;
  text-shadow: 0 0 10px yellow;
  min-height: 30px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎰 Колесо фортуны PRO</h1>

<div class="controls">
<textarea id="sectorsInput">
Что с интернетом?
АКБ уезжают?
ФН заменили?
Битрикс тестируете?
Графану тестируете?
Таблички все заполнили?
</textarea>

<button id="updateBtn">Обновить</button>
</div>

<div id="wrapper">
  <canvas id="wheel" width="420" height="420"></canvas>
  <canvas id="arrowCanvas" width="500" height="500"></canvas>
</div>

<button id="spinBtn">Крутить</button>

<div id="result"></div>

</div>

<!-- звуки -->
<audio id="tick" src="https://assets.mixkit.co/sfx/preview/mixkit-click-1112.mp3"></audio>
<audio id="win" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3"></audio>

<script>
const wheelCanvas = document.getElementById("wheel");
const ctx = wheelCanvas.getContext("2d");

const arrowCanvas = document.getElementById("arrowCanvas");
const arrowCtx = arrowCanvas.getContext("2d");

const tickSound = document.getElementById("tick");
const winSound = document.getElementById("win");

let sectors = [];
let currentAngle = 0;          // угол поворота колеса (в градусах, всегда увеличивается)
let isSpinning = false;
let lastSectorIndex = 0;
let activeSector = -1;
let animFrameId = null;

const RADIUS = 210;
const CENTER = RADIUS;

/* ===== РИСОВАНИЕ КОЛЕСА ===== */
function drawWheel() {
  ctx.clearRect(0, 0, 420, 420);
  const count = sectors.length;
  if (count === 0) return;

  const angleStep = 2 * Math.PI / count;

  for (let i = 0; i < count; i++) {
    // Градиент для объёмного вида сектора
    const grad = ctx.createLinearGradient(
      CENTER + Math.cos(i * angleStep) * RADIUS * 0.3,
      CENTER + Math.sin(i * angleStep) * RADIUS * 0.3,
      CENTER + Math.cos((i + 0.5) * angleStep) * RADIUS * 0.7,
      CENTER + Math.sin((i + 0.5) * angleStep) * RADIUS * 0.7
    );
    if (i === activeSector) {
      grad.addColorStop(0, "#ffffaa");
      grad.addColorStop(1, "#ffcc00");
    } else {
      grad.addColorStop(0, i % 2 ? "#fff0f0" : "#ffb0b0");
      grad.addColorStop(1, i % 2 ? "#ffcccc" : "#ff8888");
    }
    ctx.fillStyle = grad;

    ctx.beginPath();
    ctx.moveTo(CENTER, CENTER);
    ctx.arc(CENTER, CENTER, RADIUS, i * angleStep, (i + 1) * angleStep);
    ctx.fill();

    // Тень для секции (объём)
    ctx.shadowBlur = 0;

    ctx.save();
    ctx.translate(CENTER, CENTER);
    ctx.rotate(i * angleStep + angleStep / 2);

    ctx.fillStyle = "#000";
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowBlur = 0;

    drawWrappedText(sectors[i]);

    ctx.restore();
  }
}

function drawWrappedText(text) {
  const maxWidth = 140;        // ширина текста в пикселях
  const lineHeight = 18;
  const words = text.split(" ");
  const lines = [];
  let currentLine = "";

  for (let w of words) {
    const testLine = currentLine ? currentLine + " " + w : w;
    const metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && currentLine !== "") {
      lines.push(currentLine);
      currentLine = w;
    } else {
      currentLine = testLine;
    }
  }
  if (currentLine) lines.push(currentLine);

  const startY = -((lines.length - 1) * lineHeight) / 2;
  lines.forEach((line, idx) => {
    ctx.fillText(line, RADIUS * 0.6, startY + idx * lineHeight);
  });
}

/* ===== СТРЕЛКА (объёмная, точно на ободе) ===== */
function drawArrow() {
  arrowCtx.clearRect(0, 0, 500, 500);
  arrowCtx.save();

  // Перемещаем в точку острия стрелки (на ободе колеса)
  // Координаты острия в системе wrapper: (420, 210)
  // Переводим в координаты arrowCanvas (offset -40,-40): (460, 250)
  arrowCtx.translate(460, 250);
  // Поворачиваем, чтобы остриё смотрело в центр колеса (налево)
  arrowCtx.rotate(Math.PI);

  // Градиент для объёмной стрелки
  const grad = arrowCtx.createLinearGradient(-40, -20, 40, 20);
  grad.addColorStop(0, "#fff0d0");
  grad.addColorStop(0.3, "#ffcc88");
  grad.addColorStop(0.7, "#ffaa44");
  grad.addColorStop(1, "#cc7700");

  arrowCtx.fillStyle = grad;
  arrowCtx.shadowColor = "rgba(0,0,0,0.5)";
  arrowCtx.shadowBlur = 10;
  arrowCtx.shadowOffsetX = 2;
  arrowCtx.shadowOffsetY = 2;

  // Форма стрелки: остриё в начале координат, расширяется вправо
  arrowCtx.beginPath();
  arrowCtx.moveTo(0, 0);
  arrowCtx.lineTo(40, -20);
  arrowCtx.lineTo(40, -8);
  arrowCtx.lineTo(100, -8);
  arrowCtx.lineTo(100, 8);
  arrowCtx.lineTo(40, 8);
  arrowCtx.lineTo(40, 20);
  arrowCtx.closePath();
  arrowCtx.fill();

  // Блик на стрелке
  arrowCtx.fillStyle = "rgba(255,255,200,0.4)";
  arrowCtx.beginPath();
  arrowCtx.moveTo(10, -4);
  arrowCtx.lineTo(50, -4);
  arrowCtx.lineTo(50, 4);
  arrowCtx.lineTo(10, 4);
  arrowCtx.fill();

  // Контур
  arrowCtx.strokeStyle = "#a55a00";
  arrowCtx.lineWidth = 2;
  arrowCtx.stroke();

  arrowCtx.restore();
}

/* ===== ВРАЩЕНИЕ (только по часовой стрелке, без отскока) ===== */
function spin() {
  if (isSpinning || sectors.length === 0) return;

  isSpinning = true;
  if (animFrameId) cancelAnimationFrame(animFrameId);

  const slice = 360 / sectors.length;
  const targetIndex = Math.floor(Math.random() * sectors.length);
  const targetSectorCenter = targetIndex * slice + slice / 2;

  // Минимум 0.8 оборота + случайное количество оборотов от 2 до 6
  const minRotations = 0.8;
  const extraRotations = Math.random() * 4 + 2;
  let targetAngle = 360 * (minRotations + extraRotations) + targetSectorCenter;

  // Гарантируем, что вращение идёт только вперёд (увеличиваем угол)
  const delta = targetAngle - currentAngle;
  if (delta <= 0) {
    const fullTurns = Math.ceil((-delta) / 360);
    targetAngle += fullTurns * 360;
  }

  const startAngle = currentAngle;
  const startTime = performance.now();
  const DURATION = 4000;

  function animate(now) {
    const elapsed = now - startTime;
    let progress = Math.min(1, elapsed / DURATION);

    // Функция плавности: быстрый разгон, долгое торможение
    let ease;
    if (progress < 0.2) {
      ease = 2.5 * progress * progress;
    } else {
      const t = (progress - 0.2) / 0.8;
      ease = 0.1 + (1 - Math.pow(1 - t, 4)) * 0.9;
    }

    currentAngle = startAngle + (targetAngle - startAngle) * ease;
    wheelCanvas.style.transform = `rotate(${currentAngle}deg)`;

    // Звук при переключении сектора
    const normAngle = ((currentAngle % 360) + 360) % 360;
    const sectorIdx = Math.floor(normAngle / slice);
    if (sectorIdx !== lastSectorIndex) {
      tickSound.currentTime = 0;
      tickSound.play().catch(e => console.log("audio err", e));
      lastSectorIndex = sectorIdx;
    }

    if (progress < 1) {
      animFrameId = requestAnimationFrame(animate);
    } else {
      // Анимация завершена
      animFrameId = null;
      finishSpin();
    }
  }

  animFrameId = requestAnimationFrame(animate);
}

/* ===== ОПРЕДЕЛЕНИЕ ВЫИГРЫШНОГО СЕКТОРА ===== */
function finishSpin() {
  const slice = 360 / sectors.length;
  let normAngle = currentAngle % 360;
  if (normAngle < 0) normAngle += 360;

  // Направление острия стрелки — вправо (0°). Сектор, который сейчас под стрелкой:
  // в системе координат колеса это угол -normAngle.
  const arrowDirection = (360 - normAngle) % 360;
  const winnerIndex = Math.floor(arrowDirection / slice) % sectors.length;

  activeSector = winnerIndex;
  drawWheel();

  const resultDiv = document.getElementById("result");
  resultDiv.innerText = sectors[winnerIndex];
  winSound.play().catch(e => console.log("audio err", e));

  isSpinning = false;
}

/* ===== ОБНОВЛЕНИЕ СПИСКА СЕКТОРОВ ===== */
function updateSectors() {
  if (isSpinning) {
    alert("Дождитесь окончания вращения!");
    return;
  }

  if (animFrameId) cancelAnimationFrame(animFrameId);
  animFrameId = null;

  const raw = document.getElementById("sectorsInput").value;
  sectors = raw.split("\n")
    .map(s => s.trim())
    .filter(s => s !== "");

  currentAngle = 0;
  activeSector = -1;
  lastSectorIndex = 0;
  wheelCanvas.style.transform = "rotate(0deg)";
  document.getElementById("result").innerText = "";

  drawWheel();
}

/* ===== ИНИЦИАЛИЗАЦИЯ ===== */
drawArrow();
updateSectors();

document.getElementById("spinBtn").onclick = spin;
document.getElementById("updateBtn").onclick = updateSectors;
</script>

</body>
</html>
