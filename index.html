<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Колесо фортуны с динамическим текстом</title>
<style>
body {
  text-align: center;
  font-family: Arial, sans-serif;
  background: #111;
  color: white;
}
#wrapper {
  position: relative;
  width: 420px;
  margin: auto;
}
canvas {
  border-radius: 50%;
}
#arrow {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  margin-left: -20px;
  margin-top: -210px;
  border-left: 20px solid transparent;
  border-right: 20px solid transparent;
  border-bottom: 40px solid red;
  z-index: 10;
}
button {
  margin-top: 10px;
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}
#result {
  margin-top: 20px;
  font-size: 24px;
  font-weight: bold;
}
textarea {
  width: 400px;
  height: 100px;
  font-size: 14px;
  margin-top: 10px;
  resize: none;
}
label {
  display: block;
  margin-top: 15px;
}
</style>
</head>
<body>

<h1>🎯 Колесо фортуны с динамическим текстом</h1>

<label>Введите секторы (каждый сектор с новой строки):</label>
<textarea id="sectorsInput">
Что с интернетом?
Что у нас с АКБ, уезжают?
ФН все заменили?
Что с Битриксом, работаете?
Графану тестируете?
У меня всё, вопросы?
</textarea>
<button onclick="updateSectors()">Обновить колёсо</button>

<div id="wrapper">
  <canvas id="wheel" width="400" height="400"></canvas>
  <div id="arrow"></div>
</div>

<button onclick="spin()">Крутить</button>
<h2 id="result"></h2>
<audio id="tick" src="https://assets.mixkit.co/sfx/preview/mixkit-slot-machine-wheel-1934.mp3"></audio>

<script>
let options = [];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const tick = document.getElementById("tick");

const radius = 200;
let angle = 0;
let spinning = false;

function updateSectors() {
  const text = document.getElementById("sectorsInput").value.trim();
  if (!text) return;
  options = text.split("\n").map(s => s.trim()).filter(s => s.length > 0);
  drawWheel();
}

function drawWheel() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const num = options.length;
  if (num === 0) return;
  const arc = 2 * Math.PI / num;

  for (let i = 0; i < num; i++) {
    ctx.fillStyle = i % 2 === 0 ? "#ff0000" : "#ffffff";
    ctx.beginPath();
    ctx.moveTo(radius, radius);
    ctx.arc(radius, radius, radius, i * arc, (i + 1) * arc);
    ctx.fill();

    // текст
    ctx.save();
    ctx.translate(radius, radius);
    ctx.rotate(i * arc + arc / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = i % 2 === 0 ? "#fff" : "#000";
    ctx.font = "bold 18px Arial";
    ctx.shadowColor = "#000";
    ctx.shadowBlur = 4;
    ctx.fillText(options[i], radius - 10, 5);
    ctx.restore();
  }

  // центральный кружок
  ctx.beginPath();
  ctx.fillStyle = "#333";
  ctx.arc(radius, radius, 40, 0, 2 * Math.PI);
  ctx.fill();
  ctx.strokeStyle = "#000";
  ctx.stroke();
}

updateSectors(); // инициализация секторов по умолчанию

function animateSpin(target) {
  let start = angle;
  let startTime = null;

  function frame(time) {
    if (!startTime) startTime = time;
    let progress = (time - startTime) / 4000;
    if (progress > 1) progress = 1;

    let ease = 1 - Math.pow(1 - progress, 3);
    angle = start + (target - start) * ease;
    canvas.style.transform = `rotate(${angle}deg)`;

    if (progress < 1 && Math.random() < 0.15) {
      tick.currentTime = 0;
      tick.play();
    }

    if (progress < 1) requestAnimationFrame(frame);
    else finish();
  }

  requestAnimationFrame(frame);
}

function spin() {
  if (spinning || options.length === 0) return;
  spinning = true;

  const num = options.length;
  const slice = 360 / num;
  const spins = Math.floor(Math.random() * num);
  const finalAngle = 360 * 5 + spins * slice + slice / 2;

  angle = angle % 360; // чтобы не копилось
  animateSpin(finalAngle);
}

function finish() {
  const normalized = angle % 360;
  const num = options.length;
  const slice = 360 / num;
  let index = Math.floor(normalized / slice);
  index = (num - index) % num;
  document.getElementById("result").innerText = options[index];
  spinning = false;
  drawWheel();
}
</script>

</body>
</html>
